version: "3.8"

services:
  # Traefik 反代（global 模式：每个节点都运行一个）
  traefik:
    image: traefik:v3
    command:
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.swarm.network=lab-overlay"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 8080
        published: 8080
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - lab-overlay
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == worker

  # whoami — 3 副本，自动分布
  whoami:
    image: traefik/whoami
    networks:
      - lab-overlay
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.whoami.rule=PathPrefix(`/`)"
        - "traefik.http.services.whoami.loadbalancer.server.port=80"

networks:
  lab-overlay:
    driver: overlay
    attachable: true
