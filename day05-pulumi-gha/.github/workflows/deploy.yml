name: "Day 5 — Pulumi Deploy"

on:
  push:
    branches: [main]
    paths:
      - "day05-pulumi-gha/**"
  workflow_dispatch:
    inputs:
      action:
        description: "执行动作"
        required: true
        default: "up"
        type: choice
        options:
          - up
          - preview
          - destroy

jobs:
  pulumi:
    name: Pulumi ${{ github.event.inputs.action || 'up' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: day05-pulumi-gha

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Pulumi ${{ github.event.inputs.action || 'up' }}
        uses: pulumi/actions@v5
        with:
          command: ${{ github.event.inputs.action || 'up' }}
          stack-name: dev
          work-dir: day05-pulumi-gha
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
