apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: whoami-cloudrun
  # Cloud Run Service manifest 格式
  # 使用方式：gcloud run services replace cloudrun/service.yaml --region=us-central1
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        # 最小实例数（0 = 冷启动，>0 = 始终保持实例，消除冷启动但有最低费用）
        autoscaling.knative.dev/minScale: "0"
        # 最大实例数
        autoscaling.knative.dev/maxScale: "10"
        # 每个实例的最大并发请求数
        autoscaling.knative.dev/target: "80"
        # CPU 仅在请求期间分配（默认；设为 always 则 CPU 始终分配）
        run.googleapis.com/cpu-throttling: "true"
    spec:
      # 请求超时
      timeoutSeconds: 30
      containers:
        - image: traefik/whoami
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "1"
              memory: "256Mi"
          env:
            - name: WHOAMI_NAME
              value: "cloud-run-instance"
  traffic:
    - percent: 100
      latestRevision: true
